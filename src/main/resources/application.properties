spring.application.name=cbconnect
server.port=8089
server.servlet.context-path=/api
# CORS : http://localhost (port 80) = OssanGED branding JS → appel /v1/ged/dossiers/arbre
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:3020,http://localhost

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/bconnect_new
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true



# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.validate-migration-naming=true

# JWT
jwt.jwtSecret=Y2Jjb25uZWN0LWJuY2ItdG9nby1vc3NhbmFzdXItc2VjcmV0LWtleS0yMDI2LW1pbmltdW0tMjU2LWJpdHM=
jwt.jwtExpiration=86400000
jwt.jwtRefreshExpiration=604800000
jwt.jwtMobileExpiration=2592000000

# Encryption
encryption.secret.key=cbconnect-bncb-encryption-key-2026

# Mail
spring.mail.host=mail44.lwspanel.com
spring.mail.port=587
spring.mail.username=poolapps@ossanasur.com
spring.mail.password=OssanApps@2024
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.verification.duration=15
verification.code.duration=24
mail.from=poolapps@ossanasur.com}
mail.frontend.url=http://localhost:3000
app.mail.from=poolapps@ossanasur.com
app.mail.from-name=CBConnect
app.name=CBConnect

# OssanGED by OSSANASUR (proxy vers le moteur OssanGED reconfigure)
ossanged.base-url=http://localhost
ossanged.username=admin
ossanged.password=OssanGED@2025
# Recommande en prod : token API plus securise que username/password
# Obtenu via : docker compose exec ossanged python manage.py drf_create_token admin
# ossanged.api-token=

# URL publique (cote navigateur) d'OssanGED servie par nginx-proxy
ossanged.public-url=http://localhost

# SSO CBConnect -> OssanGED
# ossanged.sso.secret (si non defini, derive de jwt.jwtSecret)
ossanged.sso.ticket-ttl-seconds=30
ossanged.sso.session-ttl-seconds=28800

# Upload asynchrone vers OssanGED/Paperless : attendre la fin de consommation
# assez longtemps pour les PDFs avec OCR.
ossanged.upload-task-wait-seconds=240
ossanged.upload-task-poll-interval-millis=2000

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Jackson
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# Stockage fichiers local (fallback GED)
file.upload-dir=${FILE_UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB

# Cache
spring.cache.type=simple

# Logging
logging.level.com.ossanasur.cbconnect=DEBUG
logging.level.org.springframework.security=WARN
