spring.application.name=cbconnect
server.port=8089
server.servlet.context-path=/api

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/cbconnectdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.jwtSecret=Y2Jjb25uZWN0LWJuY2ItdG9nby1vc3NhbmFzdXItc2VjcmV0LWtleS0yMDI2LW1pbmltdW0tMjU2LWJpdHM=
jwt.jwtExpiration=86400000
jwt.jwtRefreshExpiration=604800000
jwt.jwtMobileExpiration=2592000000

# Encryption
encryption.secret.key=cbconnect-bncb-encryption-key-2026

# Mail
spring.mail.host=mail44.lwspanel.com
spring.mail.port=587
spring.mail.username=poolapps@ossanasur.com
spring.mail.password=OssanApps@2024
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.verification.duration=15
verification.code.duration=24
mail.from=poolapps@ossanasur.com}
mail.frontend.url=http://localhost:3000

# OssanGED by OSSANASUR (proxy vers le moteur OssanGED reconfigure)
